<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KENPAN — 検版ハブ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
@property --a{ syntax:'<angle>'; initial-value:0deg; inherits:false; }

:root{
  --bg:#ffffff; --strip:#fafaf9; --panel:#ffffff; --panel2:#f4f4f2; --line:#e7e4dd;
  --ink:#26211a; --ink-dim:#6b6357; --ink-faint:#a39a8c;
  --amber:#b9791a; --amber-bg:#f6ead2;
  --ok:#3f7d4e; --shadow:0 1px 2px rgba(40,32,20,.06),0 10px 30px rgba(40,32,20,.05);
  --mono:'JetBrains Mono',ui-monospace,monospace;
  --ui:'Zen Kaku Gothic New',system-ui,sans-serif;
}
[data-theme="dark"]{
  --bg:#14110e; --strip:#1a160f; --panel:#1d1915; --panel2:#27211a; --line:#3a3227;
  --ink:#ece5d8; --ink-dim:#a39682; --ink-faint:#7a6f5e;
  --amber:#e8a33d; --amber-bg:#33270f; --ok:#6fae7d;
  --shadow:0 1px 3px rgba(0,0,0,.4),0 12px 32px rgba(0,0,0,.32);
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--ui);
  -webkit-font-smoothing:antialiased;min-height:100vh}

/* ヘッダ */
.top{display:flex;align-items:center;gap:14px;padding:20px 28px;background:var(--strip);border-bottom:1px solid var(--line)}
.brand{display:flex;align-items:center;gap:12px}
.mark{width:30px;height:26px;display:block;flex:0 0 auto}
.brand .wmwrap{display:flex;flex-direction:column;gap:3px}
.brand .wm{font-size:20px;font-weight:700;letter-spacing:.2em;line-height:1;color:var(--ink)}
.brand .wm i{font-style:normal;color:var(--amber)}
.brand .tag{font-family:var(--mono);font-size:10px;letter-spacing:.04em;color:var(--ink-faint)}
.sp{flex:1}
.tbtn{font-family:var(--ui);font-size:13px;cursor:pointer;border:1px solid var(--line);
  background:var(--panel);color:var(--ink);border-radius:9px;padding:8px 14px;transition:.15s}
.tbtn:hover{border-color:var(--amber);background:var(--amber-bg)}
.tbtn.primary{border-color:var(--amber);background:var(--amber);color:#1a1205;font-weight:700}
.tbtn.primary:hover{filter:brightness(1.05)}

/* 2カラム本体 */
.app{max-width:1180px;margin:0 auto;padding:28px;
  display:grid;grid-template-columns:390px 1fr;gap:28px;align-items:start}

/* 左：詳細パネル */
.detail{position:sticky;top:24px;--glow:var(--accent);
  background:color-mix(in srgb, var(--accent) 5%, var(--panel));
  border:1px solid color-mix(in srgb, var(--accent) 22%, var(--line));
  border-radius:20px;padding:30px 28px;box-shadow:var(--shadow);
  transition:background .25s, border-color .25s}
[data-theme="dark"] .detail{--glow:color-mix(in srgb, var(--accent) 68%, white);
  background:color-mix(in srgb, var(--accent) 18%, var(--panel));
  border-color:color-mix(in srgb, var(--accent) 42%, var(--line))}
.detail .dicon{width:76px;height:76px;border-radius:20px;color:var(--glow);
  background:color-mix(in srgb, var(--glow) 14%, var(--panel));
  border:1px solid color-mix(in srgb, var(--glow) 26%, transparent);
  display:flex;align-items:center;justify-content:center;margin-bottom:20px}
.detail .dicon svg{width:40px;height:40px}
.detail .dcat{font-family:var(--mono);font-size:11px;letter-spacing:.09em;text-transform:uppercase;
  color:var(--glow);margin-bottom:8px}
.detail h2{margin:0 0 14px;font-size:25px;line-height:1.3}
.detail .ddesc{margin:0 0 12px;color:var(--ink-dim);font-size:14.5px;line-height:1.85}
.detail .dfile{font-family:var(--mono);font-size:11.5px;color:var(--ink-faint);
  margin:0 0 24px;word-break:break-all}
.dact{display:flex;gap:10px;margin-top:8px}
.dact button{flex:1;height:48px;font-family:var(--ui);font-size:13px;font-weight:600;
  cursor:pointer;border-radius:12px;border:1px solid transparent;transition:.16s;
  display:flex;align-items:center;justify-content:center;gap:7px}
.dact button .bi{display:flex;align-items:center;justify-content:center}
.dact button .bi svg{width:18px;height:18px}
.dact .open{background:var(--glow);color:#fff;
  box-shadow:0 6px 16px color-mix(in srgb, var(--glow) 20%, transparent)}
.dact .open:hover{filter:brightness(1.06);transform:translateY(-1px)}
.dact .man{background:transparent;color:var(--ink-dim);
  border-color:color-mix(in srgb, var(--glow) 30%, var(--line))}
.dact .man:hover{color:var(--glow);border-color:var(--glow);background:color-mix(in srgb,var(--glow) 7%, var(--panel))}
.dact .man[disabled]{opacity:.4;cursor:not-allowed}
.dact .man[disabled]:hover{color:var(--ink-dim);border-color:color-mix(in srgb, var(--glow) 30%, var(--line));background:transparent}

/* 右：見出し＋タイル */
.right h1{font-size:22px;margin:0 0 4px;letter-spacing:.01em}
.right .sub{margin:0 0 20px;color:var(--ink-dim);font-size:13px;line-height:1.7}
.tiles{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:22px 14px}

.cell{display:flex;flex-direction:column;align-items:center;gap:9px}
.iconbtn{position:relative;isolation:isolate;--glow:var(--accent);cursor:pointer;
  font:inherit;appearance:none;-webkit-appearance:none;color:var(--glow);
  width:72px;height:72px;border-radius:20px;
  background:color-mix(in srgb, var(--accent) 12%, var(--panel));
  border:1px solid color-mix(in srgb, var(--accent) 24%, var(--line));
  display:flex;align-items:center;justify-content:center;
  transition:transform .16s, box-shadow .16s, border-color .16s, background .16s}
[data-theme="dark"] .iconbtn{--glow:color-mix(in srgb, var(--accent) 70%, white);
  background:color-mix(in srgb, var(--accent) 22%, var(--panel));
  border-color:color-mix(in srgb, var(--accent) 42%, var(--line))}
.iconbtn svg{width:34px;height:34px}
.iconbtn:hover{transform:translateY(-3px);
  box-shadow:0 4px 10px rgba(40,32,20,.07),0 14px 30px color-mix(in srgb, var(--glow) 26%, transparent)}
.iconbtn.sel{border-color:var(--glow);
  box-shadow:0 0 0 2px color-mix(in srgb, var(--glow) 45%, transparent)}

.cap{font-size:12px;line-height:1.35;font-weight:500;text-align:center;color:var(--ink);max-width:96px}
.iconbtn.sel + .cap{color:var(--glow);font-weight:700}

/* ホバーでLEDがアイコンの縁を一周 */
.iconbtn::after{content:'';position:absolute;inset:0;border-radius:inherit;padding:1.8px;
  background:conic-gradient(from var(--a),
     #fff 0deg, var(--glow) 14deg,
     color-mix(in srgb, var(--glow) 0%, transparent) 78deg, transparent 360deg);
  -webkit-mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;mask-composite:exclude;
  filter:drop-shadow(0 0 3px color-mix(in srgb, var(--glow) 70%, transparent));
  opacity:0;transition:opacity .25s;pointer-events:none;z-index:3}
.iconbtn:hover::after{opacity:1;animation:led 1.4s linear infinite}
@keyframes led{ to{ --a:360deg; } }
@media (prefers-reduced-motion: reduce){ .iconbtn:hover::after{animation:none;opacity:.9} }

.iconbtn .del{position:absolute;top:-7px;right:-7px;width:22px;height:22px;border-radius:50%;
  border:1px solid var(--line);background:var(--panel);color:var(--ink-faint);z-index:4;
  display:none;align-items:center;justify-content:center;cursor:pointer;font-size:13px;line-height:1}
.iconbtn .del:hover{border-color:#c8362a;color:#c8362a}
body.editing .iconbtn .del{display:flex}

.iconbtn.add{background:transparent;border-style:dashed;color:var(--ink-faint)}
.iconbtn.add:hover{border-color:var(--amber);color:var(--amber);box-shadow:none}
.iconbtn.add::after{display:none}
.iconbtn.add .plus{font-size:28px;line-height:1}

/* フッタ */
.foot{max-width:1180px;margin:0 auto;padding:8px 28px 44px;color:var(--ink-faint);font-size:12px;line-height:1.7}
.foot code{font-family:var(--mono);background:var(--panel2);padding:1px 5px;border-radius:4px}

/* モーダル */
.modal-bg{position:fixed;inset:0;background:rgba(20,15,10,.45);display:none;
  align-items:center;justify-content:center;z-index:50;padding:20px}
.modal-bg.show{display:flex}
.modal{background:var(--panel);border:1px solid var(--line);border-radius:16px;
  width:100%;max-width:460px;padding:24px;box-shadow:var(--shadow);max-height:90vh;overflow:auto}
.modal h2{margin:0 0 4px;font-size:17px}
.modal .hint{margin:0 0 18px;font-size:12px;color:var(--ink-dim);line-height:1.6}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:var(--ink-dim);margin-bottom:5px}
.field input,.field textarea{width:100%;font-family:var(--ui);font-size:13px;padding:9px 11px;
  border:1px solid var(--line);border-radius:9px;background:var(--panel2);color:var(--ink)}
.field input:focus,.field textarea:focus{outline:none;border-color:var(--amber);background:var(--panel)}
.field .mono{font-family:var(--mono);font-size:12px}
.field textarea{resize:vertical;min-height:54px}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
.iconrow{display:flex;gap:7px;flex-wrap:wrap}
.iconrow button{width:42px;height:42px;border-radius:11px;border:1px solid var(--line);
  background:var(--panel2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s}
.iconrow button svg{width:23px;height:23px}
.iconrow button.sel{border-color:currentColor;background:color-mix(in srgb, currentColor 12%, var(--panel))}

@media(max-width:860px){
  .app{grid-template-columns:1fr;gap:20px}
  .detail{position:static}
}
</style>
</head>
<body>

<div class="top">
  <div class="brand">
    <svg class="mark" viewBox="0 0 60 52" fill="none" aria-hidden="true">
      <rect x="3" y="3" width="54" height="46" rx="6" fill="var(--amber-bg)" stroke="var(--amber)" stroke-width="2.5"/>
      <line x1="3" y1="16" x2="11" y2="16" stroke="var(--amber)" stroke-width="2.5"/>
      <line x1="3" y1="26" x2="14" y2="26" stroke="var(--amber)" stroke-width="2.5"/>
      <line x1="3" y1="36" x2="11" y2="36" stroke="var(--amber)" stroke-width="2.5"/>
      <path d="M26 27l6 6 12-14" stroke="var(--amber)" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <div class="wmwrap"><span class="wm">KEN<i>PAN</i></span><span class="tag">検版ハブ · 下版前点検</span></div>
  </div>
  <div class="sp"></div>
  <button class="tbtn" id="editBtn">並べ替え・削除</button>
  <button class="tbtn" id="themeBtn" title="表示切替">◑</button>
</div>

<div class="app">
  <aside class="detail" id="detail"></aside>

  <section class="right">
    <h1>点検ツールを選ぶ</h1>
    <p class="sub">アイコンをクリックすると、そのツールが別タブで開きます。カーソルを合わせると左側に説明とマニュアルが表示されます。各ツールはブラウザ内で完結し、PDFが外部に送信されることはありません。</p>
    <div class="tiles" id="tiles"></div>
  </section>
</div>

<div class="foot">
  <p>このページと各ツール・マニュアルのHTMLは同じフォルダに置いてください。リンクは相対パス（例 <code>isbn-barcode-check.html</code>）で開きます。設定はこのブラウザに保存されます。</p>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h2 id="modalTitle">ツールを追加</h2>
    <p class="hint">同じフォルダにあるHTMLファイル名（相対パス）と表示情報を入力してください。マニュアルは任意です。</p>
    <div class="field"><label>ツール名</label><input id="fName" placeholder="例：ノンブル検版"></div>
    <div class="field"><label>ファイル名 / URL</label><input id="fUrl" class="mono" placeholder="例：nombre-check.html"></div>
    <div class="field"><label>マニュアル（任意）</label><input id="fMan" class="mono" placeholder="例：manual-nombre.html"></div>
    <div class="field"><label>分類（任意）</label><input id="fCat" placeholder="例：位置・体裁"></div>
    <div class="field"><label>説明（任意）</label><textarea id="fDesc" placeholder="どんな点検をするツールかを説明"></textarea></div>
    <div class="field"><label>アイコン</label><div class="iconrow" id="iconRow"></div></div>
    <div class="modal-actions">
      <button class="tbtn" id="cancelBtn">キャンセル</button>
      <button class="tbtn primary" id="saveBtn">保存</button>
    </div>
  </div>
</div>

<script>
const $=s=>document.querySelector(s);
const STORE='kenpan-hub-tools-v1', THEME='kenpan-hub-theme', SEEN='kenpan-hub-seen-defaults-v1';

const ICONS={
  barcode:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 5v14M7 5v14M10 5v10M13 5v14M16 5v10M20 5v14" stroke-linecap="round"/></svg>',
  diff:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="8" height="16" rx="1.5"/><rect x="13" y="4" width="8" height="16" rx="1.5"/><path d="M7 9h0M7 13h0" stroke-linecap="round"/></svg>',
  position:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="4" width="16" height="16" rx="1.5"/><circle cx="12" cy="12" r="3"/><path d="M12 4v3M12 17v3M4 12h3M17 12h3" stroke-linecap="round"/></svg>',
  toc:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 6h14M5 12h14M5 18h9" stroke-linecap="round"/><circle cx="20" cy="18" r="1.4" fill="currentColor"/></svg>',
  check:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12l5 5L20 6" stroke-linecap="round" stroke-linejoin="round"/></svg>',
  doc:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 3h7l5 5v13H7z"/><path d="M14 3v5h5M10 13h6M10 17h6" stroke-linecap="round"/></svg>',
  ruler:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="8" width="18" height="8" rx="1.5"/><path d="M7 8v3M11 8v4M15 8v3M19 8v4" stroke-linecap="round"/></svg>'
};
const ICON_KEYS=Object.keys(ICONS);
const ICON_COLORS={ barcode:'#2563eb',position:'#0d9488',diff:'#7c3aed',toc:'#d97706',check:'#16a34a',doc:'#e11d48',ruler:'#0891b2' };
const colorOf=k=>ICON_COLORS[k]||'#64748b';

const DEFAULTS=[
  {name:'ISBN検版', url:'isbn-barcode-check.html', manual:'manual-isbn.html', cat:'バーコード照合', icon:'barcode',
   desc:'表紙・カバーの2段バーコードを検出し、ISBN・Cコード・価格の印字と照合します。バーの欠け・つぶれといった品質不良も検知し、人が読む数字行を誤検出しないよう調整済みです。'},
  {name:'ノンブル検版', url:'nombre-check.html', manual:'manual-nombre.html', cat:'位置・体裁', icon:'position',
   desc:'ノンブル（ページ番号）の位置を検版します。ズーム／パン、OCRモード、表裏の見当チェックに対応します。'},
  {name:'下版差分チェッカー', url:'pdf-diff-check.html', manual:'manual-pdf-diff.html', cat:'差分', icon:'diff',
   desc:'同一DPIでレンダリングした2つの下版PDFをピクセル単位で差分検出します。5つの表示モードと、全ページを一気に見渡す概観スキャンを備えています。'},
  {name:'目次整合検版', url:'toc_kenpan.html', manual:'manual-toc.html', cat:'整合', icon:'toc',
   desc:'目次・見出し・柱・ノンブルの相互整合をチェックします。横組み・縦組みの両方に対応します。'}
];

let tools=load();
let shown=0;          // 現在左に表示中のツール
let frozen=false;     // 詳細パネルにカーソルがある間は切替を止める
let hoverTimer=null;  // ホバー遅延（通過しただけでは切り替えない）

function load(){
  let saved=null;
  try{ const j=localStorage.getItem(STORE); if(j) saved=JSON.parse(j); }catch(e){}
  if(!saved){ try{ localStorage.setItem(SEEN, JSON.stringify(DEFAULTS.map(d=>d.url))); }catch(e){} return DEFAULTS.slice(); }
  let seen=[]; try{ seen=JSON.parse(localStorage.getItem(SEEN)||'[]'); }catch(e){}
  const set=new Set(seen); let changed=false;
  DEFAULTS.forEach(d=>{ if(!set.has(d.url)){ if(!saved.some(t=>t.url===d.url)) saved.push({...d}); set.add(d.url); changed=true; } });
  if(changed){ try{localStorage.setItem(SEEN,JSON.stringify([...set]));}catch(e){} try{localStorage.setItem(STORE,JSON.stringify(saved));}catch(e){} }
  // 既存の保存データに、後から追加したマニュアルを補完（削除済みツールは復活させない）
  const dmap=Object.fromEntries(DEFAULTS.map(d=>[d.url,d]));
  saved.forEach(t=>{ if(t.manual===undefined) t.manual='';
    if(!t.manual && dmap[t.url] && dmap[t.url].manual) t.manual=dmap[t.url].manual; });
  return saved;
}
function save(){ try{ localStorage.setItem(STORE, JSON.stringify(tools)); }catch(e){} }
function esc(s){return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function openUrl(u){ if(u) window.open(u,'_blank','noopener'); }

function applyTheme(t){ document.documentElement.setAttribute('data-theme', t); try{localStorage.setItem(THEME,t);}catch(e){} }
applyTheme((()=>{ try{return localStorage.getItem(THEME)||'light';}catch(e){return 'light';} })());
$('#themeBtn').onclick=()=>{ const d=document.documentElement.getAttribute('data-theme')==='dark'; applyTheme(d?'light':'dark'); };

function renderDetail(i){
  shown=i; const t=tools[i]; if(!t){ $('#detail').innerHTML=''; return; }
  const d=$('#detail'); d.style.setProperty('--accent', colorOf(t.icon));
  const hasMan=!!(t.manual&&t.manual.trim());
  d.innerHTML=`
    <div class="dicon">${ICONS[t.icon]||ICONS.check}</div>
    ${t.cat?`<div class="dcat">${esc(t.cat)}</div>`:''}
    <h2>${esc(t.name)}</h2>
    <p class="ddesc">${esc(t.desc||'説明は未設定です。')}</p>
    <p class="dfile">${esc(t.url)}</p>
    <div class="dact">
      <button class="open" title="${esc(t.name)}を別タブで開く">
        <span class="bi"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 4h6v6M20 4l-9 9M19 13v6a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1h6" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
        <span>開く</span>
      </button>
      <button class="man" ${hasMan?'':'disabled'} title="${hasMan?'操作マニュアルを別タブで開く':'マニュアル未設定'}">
        <span class="bi"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 5a2 2 0 0 1 2-2h6v16H6a2 2 0 0 0-2 2zM20 5a2 2 0 0 0-2-2h-6v16h6a2 2 0 0 1 2 2z" stroke-linejoin="round"/></svg></span>
        <span>マニュアル</span>
      </button>
    </div>`;
  d.querySelector('.open').onclick=()=>openUrl(t.url);
  if(hasMan) d.querySelector('.man').onclick=()=>{
    const w=Math.min(700, (screen.availWidth||900)), h=Math.min(800, (screen.availHeight||820));
    const l=Math.max(0,((screen.availWidth||w)-w)/2), tp=Math.max(0,((screen.availHeight||h)-h)/2);
    window.open(t.manual,'_blank','noopener,noreferrer,width='+w+',height='+h+',left='+l+',top='+tp);
  };
}

function showDetail(i){ shown=i; markShown(); renderDetail(i); }
function scheduleDetail(i){ if(frozen) return; clearTimeout(hoverTimer); hoverTimer=setTimeout(()=>showDetail(i),120); }

function renderTiles(){
  const g=$('#tiles'); g.innerHTML='';
  tools.forEach((t,i)=>{
    const cell=document.createElement('div'); cell.className='cell';
    const b=document.createElement('button');
    b.className='iconbtn'+(i===shown?' sel':''); b.type='button';
    b.style.setProperty('--accent', colorOf(t.icon));
    b.title=t.name+'を開く';
    b.innerHTML=`<span class="del" title="削除" data-del="${i}">×</span>${ICONS[t.icon]||ICONS.check}`;
    b.addEventListener('mouseenter',()=>scheduleDetail(i));
    b.addEventListener('focus',()=>showDetail(i));
    b.addEventListener('click',e=>{ if(e.target.closest('.del')) return; openUrl(t.url); });
    const cap=document.createElement('span'); cap.className='cap'; cap.textContent=t.name;
    cell.appendChild(b); cell.appendChild(cap); g.appendChild(cell);
  });
  const acell=document.createElement('div'); acell.className='cell';
  const add=document.createElement('button'); add.className='iconbtn add'; add.type='button'; add.title='ツールを追加';
  add.innerHTML=`<span class="plus">＋</span>`;
  add.addEventListener('click',openModal);
  const acap=document.createElement('span'); acap.className='cap'; acap.textContent='追加';
  acell.appendChild(add); acell.appendChild(acap); g.appendChild(acell);
  g.querySelectorAll('[data-del]').forEach(b=>{
    b.onclick=e=>{ e.stopPropagation(); const i=+b.dataset.del;
      if(confirm(`「${tools[i].name}」を一覧から削除しますか？\n（ファイル自体は消えません）`)){
        tools.splice(i,1); save();
        if(shown>=tools.length) shown=Math.max(0,tools.length-1);
        renderTiles(); renderDetail(shown); } };
  });
}
function markShown(){ const els=$('#tiles').querySelectorAll('.iconbtn:not(.add)');
  els.forEach((e,i)=>e.classList.toggle('sel', i===shown)); }

/* グリッドを離れたら保留中の切替を取消（最後に確定した表示を維持） */
$('#tiles').addEventListener('mouseleave',()=>clearTimeout(hoverTimer));
/* 詳細パネル上では切替を凍結（開く・マニュアルを確実に押せる） */
$('#detail').addEventListener('mouseenter',()=>{ frozen=true; clearTimeout(hoverTimer); });
$('#detail').addEventListener('mouseleave',()=>{ frozen=false; });

$('#editBtn').onclick=()=>{ document.body.classList.toggle('editing');
  $('#editBtn').textContent=document.body.classList.contains('editing')?'完了':'並べ替え・削除'; };

let selIcon='check';
function buildIconRow(){
  const r=$('#iconRow'); r.innerHTML='';
  ICON_KEYS.forEach(k=>{ const b=document.createElement('button'); b.innerHTML=ICONS[k];
    b.style.color=colorOf(k); if(k===selIcon) b.classList.add('sel');
    b.onclick=()=>{ selIcon=k; buildIconRow(); }; r.appendChild(b); });
}
function openModal(){
  selIcon='check'; buildIconRow();
  $('#fName').value=''; $('#fUrl').value=''; $('#fMan').value=''; $('#fCat').value=''; $('#fDesc').value='';
  $('#modalBg').classList.add('show'); $('#fName').focus();
}
function closeModal(){ $('#modalBg').classList.remove('show'); }
$('#cancelBtn').onclick=closeModal;
$('#modalBg').onclick=e=>{ if(e.target===$('#modalBg')) closeModal(); };
$('#saveBtn').onclick=()=>{
  const name=$('#fName').value.trim(), url=$('#fUrl').value.trim();
  if(!name||!url){ alert('ツール名とファイル名は必須です。'); return; }
  tools.push({name, url, manual:$('#fMan').value.trim(), cat:$('#fCat').value.trim(),
    desc:$('#fDesc').value.trim(), icon:selIcon});
  save(); closeModal(); shown=tools.length-1; renderTiles(); renderDetail(shown);
};
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });

renderTiles();
renderDetail(shown);
</script>
</body>
</html>

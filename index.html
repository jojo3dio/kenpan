<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>検版ハブ — 下版前点検ツール</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
/* LED縁取り用：角度をアニメーションできるよう登録 */
@property --a{ syntax:'<angle>'; initial-value:0deg; inherits:false; }

:root{
  --bg:#ffffff; --strip:#fafaf9; --panel:#ffffff; --panel2:#f4f4f2; --line:#e7e4dd;
  --ink:#26211a; --ink-dim:#6b6357; --ink-faint:#a39a8c;
  --amber:#b9791a; --amber-bg:#f6ead2;
  --ok:#3f7d4e; --shadow:0 1px 2px rgba(40,32,20,.06),0 10px 30px rgba(40,32,20,.05);
  --mono:'JetBrains Mono',ui-monospace,monospace;
  --ui:'Zen Kaku Gothic New',system-ui,sans-serif;
}
[data-theme="dark"]{
  --bg:#14110e; --strip:#1a160f; --panel:#1d1915; --panel2:#27211a; --line:#3a3227;
  --ink:#ece5d8; --ink-dim:#a39682; --ink-faint:#7a6f5e;
  --amber:#e8a33d; --amber-bg:#33270f; --ok:#6fae7d;
  --shadow:0 1px 3px rgba(0,0,0,.4),0 12px 32px rgba(0,0,0,.32);
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--ui);
  -webkit-font-smoothing:antialiased;min-height:100vh}
a{color:inherit}

/* ヘッダ */
.top{display:flex;align-items:center;gap:14px;padding:20px 28px;background:var(--strip);border-bottom:1px solid var(--line)}
.brand{display:flex;align-items:center;gap:12px}
.mark{width:30px;height:26px;display:block;flex:0 0 auto}
.brand b{font-size:17px;letter-spacing:.02em}
.brand span{font-size:12px;color:var(--ink-dim)}
.sp{flex:1}
.tbtn{font-family:var(--ui);font-size:13px;cursor:pointer;border:1px solid var(--line);
  background:var(--panel);color:var(--ink);border-radius:9px;padding:8px 14px;transition:.15s}
.tbtn:hover{border-color:var(--amber);background:var(--amber-bg)}
.tbtn.primary{border-color:var(--amber);background:var(--amber);color:#1a1205;font-weight:700}
.tbtn.primary:hover{filter:brightness(1.05)}

/* リード */
.lead{max-width:1080px;margin:0 auto;padding:34px 28px 8px}
.lead h1{font-size:26px;margin:0 0 8px;letter-spacing:.01em}
.lead p{margin:0;color:var(--ink-dim);font-size:14px;line-height:1.7;max-width:62ch}

/* グリッド */
.grid{max-width:1080px;margin:0 auto;padding:22px 28px 60px;
  display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:16px}

/* カード（横並び：アイコン左／説明右） */
.card{position:relative;isolation:isolate;display:flex;flex-direction:row;
  align-items:flex-start;gap:15px;
  background:var(--panel);border:1px solid var(--line);border-radius:16px;
  padding:18px 20px;box-shadow:var(--shadow);min-height:138px;
  transition:transform .16s ease, box-shadow .16s ease, border-color .16s ease}

/* ツールカードは薄く同系色のティント＋アクセント縁 */
.card.tool{--glow:var(--accent);cursor:pointer;
  background:color-mix(in srgb, var(--accent) 5%, var(--panel));
  border-color:color-mix(in srgb, var(--accent) 18%, var(--line))}
[data-theme="dark"] .card.tool{
  --glow:color-mix(in srgb, var(--accent) 68%, white);
  background:color-mix(in srgb, var(--accent) 22%, var(--panel));
  border-color:color-mix(in srgb, var(--accent) 48%, var(--line))}

.card.tool:hover{transform:translateY(-2px);
  box-shadow:0 2px 4px rgba(40,32,20,.06),
             0 14px 34px color-mix(in srgb, var(--glow) 22%, transparent)}

/* LEDが縁を一周する演出 */
.card.tool::after{
  content:'';position:absolute;inset:0;border-radius:inherit;padding:1.7px;
  background:conic-gradient(from var(--a),
     #ffffff 0deg,
     var(--glow) 14deg,
     color-mix(in srgb, var(--glow) 0%, transparent) 78deg,
     transparent 360deg);
  -webkit-mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;mask-composite:exclude;
  filter:drop-shadow(0 0 3px color-mix(in srgb, var(--glow) 70%, transparent));
  opacity:0;transition:opacity .25s;pointer-events:none;z-index:3}
.card.tool:hover::after{opacity:1;animation:led 1.5s linear infinite}
@keyframes led{ to{ --a:360deg; } }
@media (prefers-reduced-motion: reduce){
  .card.tool:hover::after{animation:none;opacity:.9}
}

/* アイコンチップ */
.card .icon{width:50px;height:50px;border-radius:13px;color:var(--glow);
  background:color-mix(in srgb, var(--glow) 13%, var(--panel));
  border:1px solid color-mix(in srgb, var(--glow) 24%, transparent);
  display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.card .icon svg{width:27px;height:27px}

/* 本文側 */
.card .body{flex:1;min-width:0;display:flex;flex-direction:column;min-height:50px}
.card .cat{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;
  color:var(--glow);margin-bottom:5px}
.card h3{margin:0 0 6px;font-size:16px;line-height:1.3}
.card p{margin:0;color:var(--ink-dim);font-size:12.5px;line-height:1.6}
.card .go{margin-top:auto;padding-top:12px;display:flex;align-items:center;gap:6px;
  font-size:12.5px;color:var(--ink-faint);font-weight:500;transition:color .16s}
.card.tool:hover .go{color:var(--glow)}

.card .del{position:absolute;top:11px;right:11px;width:26px;height:26px;border-radius:8px;
  border:1px solid var(--line);background:var(--panel);color:var(--ink-faint);z-index:4;
  display:none;align-items:center;justify-content:center;cursor:pointer;font-size:15px;line-height:1}
.card .del:hover{border-color:#c8362a;color:#c8362a}
body.editing .card .del{display:flex}

/* 追加カード */
.card.add{align-items:center;justify-content:center;flex-direction:column;text-align:center;
  cursor:pointer;border-style:dashed;color:var(--ink-faint);background:transparent;box-shadow:none;gap:8px}
.card.add:hover{border-color:var(--amber);color:var(--amber)}
.card.add .plus{font-size:30px;line-height:1}
.card.add small{font-size:12px}

/* フッタ */
.foot{max-width:1080px;margin:0 auto;padding:0 28px 40px;color:var(--ink-faint);font-size:12px;line-height:1.7}
.foot code{font-family:var(--mono);background:var(--panel2);padding:1px 5px;border-radius:4px}

/* モーダル */
.modal-bg{position:fixed;inset:0;background:rgba(20,15,10,.45);display:none;
  align-items:center;justify-content:center;z-index:50;padding:20px}
.modal-bg.show{display:flex}
.modal{background:var(--panel);border:1px solid var(--line);border-radius:16px;
  width:100%;max-width:440px;padding:24px;box-shadow:var(--shadow)}
.modal h2{margin:0 0 4px;font-size:17px}
.modal .hint{margin:0 0 18px;font-size:12px;color:var(--ink-dim);line-height:1.6}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:var(--ink-dim);margin-bottom:5px}
.field input,.field textarea{width:100%;font-family:var(--ui);font-size:13px;padding:9px 11px;
  border:1px solid var(--line);border-radius:9px;background:var(--panel2);color:var(--ink)}
.field input:focus,.field textarea:focus{outline:none;border-color:var(--amber);background:var(--panel)}
.field .mono{font-family:var(--mono);font-size:12px}
.field textarea{resize:vertical;min-height:54px}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
.iconrow{display:flex;gap:7px;flex-wrap:wrap}
.iconrow button{width:42px;height:42px;border-radius:11px;border:1px solid var(--line);
  background:var(--panel2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s}
.iconrow button svg{width:23px;height:23px}
.iconrow button.sel{border-color:currentColor;
  background:color-mix(in srgb, currentColor 12%, var(--panel))}
</style>
</head>
<body>

<div class="top">
  <div class="brand">
    <!-- 署名マーク: 検版=点検の目盛り入り検版定規 -->
    <svg class="mark" viewBox="0 0 60 52" fill="none" aria-hidden="true">
      <rect x="3" y="3" width="54" height="46" rx="6" fill="var(--amber-bg)" stroke="var(--amber)" stroke-width="2.5"/>
      <line x1="3" y1="16" x2="11" y2="16" stroke="var(--amber)" stroke-width="2.5"/>
      <line x1="3" y1="26" x2="14" y2="26" stroke="var(--amber)" stroke-width="2.5"/>
      <line x1="3" y1="36" x2="11" y2="36" stroke="var(--amber)" stroke-width="2.5"/>
      <path d="M26 27l6 6 12-14" stroke="var(--amber)" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <div>
      <b>検版ハブ</b><br><span>下版前点検ツール</span>
    </div>
  </div>
  <div class="sp"></div>
  <button class="tbtn" id="editBtn">並べ替え・削除</button>
  <button class="tbtn" id="themeBtn" title="表示切替">◑</button>
</div>

<div class="lead">
  <h1>点検したいデータを選ぶ</h1>
  <p>各ツールはブラウザ内で完結し、PDFが外部に送信されることはありません。タイルを押すと別タブで開きます。新しく作ったツールはいつでも追加できます。</p>
</div>

<div class="grid" id="grid"></div>

<div class="foot">
  <p>このページと各ツールのHTMLは同じフォルダに置いてください。リンクは相対パス（例 <code>isbn-barcode-check.html</code>）で開きます。設定はこのブラウザに保存され、次回も同じ並びで表示されます。</p>
</div>

<!-- 追加/編集モーダル -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h2 id="modalTitle">ツールを追加</h2>
    <p class="hint">同じフォルダにあるHTMLファイル名（相対パス）と、表示する情報を入力してください。</p>
    <div class="field"><label>ツール名</label><input id="fName" placeholder="例：ノンブル検版"></div>
    <div class="field"><label>ファイル名 / URL</label><input id="fUrl" class="mono" placeholder="例：nombre-check.html"></div>
    <div class="field"><label>分類（任意）</label><input id="fCat" placeholder="例：位置・体裁"></div>
    <div class="field"><label>説明（任意）</label><textarea id="fDesc" placeholder="どんな点検をするツールかを一言で"></textarea></div>
    <div class="field"><label>アイコン</label><div class="iconrow" id="iconRow"></div></div>
    <div class="modal-actions">
      <button class="tbtn" id="cancelBtn">キャンセル</button>
      <button class="tbtn primary" id="saveBtn">保存</button>
    </div>
  </div>
</div>

<script>
const $=s=>document.querySelector(s);
const STORE='kenpan-hub-tools-v1', THEME='kenpan-hub-theme', SEEN='kenpan-hub-seen-defaults-v1';

/* アイコン集（currentColor＝カード毎のアクセント色で描画） */
const ICONS={
  barcode:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 5v14M7 5v14M10 5v10M13 5v14M16 5v10M20 5v14" stroke-linecap="round"/></svg>',
  diff:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="8" height="16" rx="1.5"/><rect x="13" y="4" width="8" height="16" rx="1.5"/><path d="M7 9h0M7 13h0" stroke-linecap="round"/></svg>',
  position:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="4" width="16" height="16" rx="1.5"/><circle cx="12" cy="12" r="3"/><path d="M12 4v3M12 17v3M4 12h3M17 12h3" stroke-linecap="round"/></svg>',
  toc:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 6h14M5 12h14M5 18h9" stroke-linecap="round"/><circle cx="20" cy="18" r="1.4" fill="currentColor"/></svg>',
  check:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12l5 5L20 6" stroke-linecap="round" stroke-linejoin="round"/></svg>',
  doc:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 3h7l5 5v13H7z"/><path d="M14 3v5h5M10 13h6M10 17h6" stroke-linecap="round"/></svg>',
  ruler:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="8" width="18" height="8" rx="1.5"/><path d="M7 8v3M11 8v4M15 8v3M19 8v4" stroke-linecap="round"/></svg>'
};
const ICON_KEYS=Object.keys(ICONS);

/* アイコンごとのアクセント色（見分けやすさ） */
const ICON_COLORS={
  barcode:'#2563eb',  /* 青   */
  position:'#0d9488', /* ティール */
  diff:'#7c3aed',     /* 紫   */
  toc:'#d97706',      /* 橙   */
  check:'#16a34a',    /* 緑   */
  doc:'#e11d48',      /* ローズ */
  ruler:'#0891b2'     /* シアン */
};
const colorOf=k=>ICON_COLORS[k]||'#64748b';

/* 既定のツール（中田さんの既存ツール群） */
const DEFAULTS=[
  {name:'ISBN検版', url:'isbn-barcode-check.html', cat:'バーコード照合', icon:'barcode',
   desc:'表紙・カバーの2段バーコードを検出し、ISBN・Cコード・価格の印字と照合。バーの欠け・つぶれも検知します。'},
  {name:'ノンブル検版', url:'nombre-check.html', cat:'位置・体裁', icon:'position',
   desc:'ノンブルの位置を検版。ズーム/パン、OCRモード、表裏見当チェックに対応します。'},
  {name:'下版差分チェッカー', url:'pdf-diff-check.html', cat:'差分', icon:'diff',
   desc:'同一DPIレンダリングで2つの下版PDFをピクセル差分検出。5つの表示モードと全ページ概観スキャン。'},
  {name:'目次整合検版', url:'toc_kenpan.html', cat:'整合', icon:'toc',
   desc:'目次・見出し・柱・ノンブルの相互整合をチェック。横組み・縦組み両対応。'}
];

let tools=load();

/* 保存済みを読み込みつつ、新しい既定ツールだけ自動で追加（削除済みは復活させない） */
function load(){
  let saved=null;
  try{ const j=localStorage.getItem(STORE); if(j) saved=JSON.parse(j); }catch(e){}
  if(!saved){
    try{ localStorage.setItem(SEEN, JSON.stringify(DEFAULTS.map(d=>d.url))); }catch(e){}
    return DEFAULTS.slice();
  }
  let seen=[]; try{ seen=JSON.parse(localStorage.getItem(SEEN)||'[]'); }catch(e){}
  const seenSet=new Set(seen); let changed=false;
  DEFAULTS.forEach(d=>{
    if(!seenSet.has(d.url)){
      if(!saved.some(t=>t.url===d.url)) saved.push({...d});
      seenSet.add(d.url); changed=true;
    }
  });
  if(changed){
    try{ localStorage.setItem(SEEN, JSON.stringify([...seenSet])); }catch(e){}
    try{ localStorage.setItem(STORE, JSON.stringify(saved)); }catch(e){}
  }
  return saved;
}
function save(){ try{ localStorage.setItem(STORE, JSON.stringify(tools)); }catch(e){} }

/* テーマ */
function applyTheme(t){ document.documentElement.setAttribute('data-theme', t); try{localStorage.setItem(THEME,t);}catch(e){} }
applyTheme((()=>{ try{return localStorage.getItem(THEME)||'light';}catch(e){return 'light';} })());
$('#themeBtn').onclick=()=>{ const d=document.documentElement.getAttribute('data-theme')==='dark'; applyTheme(d?'light':'dark'); };

/* 描画 */
function render(){
  const g=$('#grid'); g.innerHTML='';
  tools.forEach((t,i)=>{
    const c=document.createElement('div');
    c.className='card tool'; c.tabIndex=0;
    c.style.setProperty('--accent', colorOf(t.icon));
    c.innerHTML=`
      <button class="del" title="削除" data-del="${i}">×</button>
      <div class="icon">${ICONS[t.icon]||ICONS.check}</div>
      <div class="body">
        ${t.cat?`<div class="cat">${esc(t.cat)}</div>`:''}
        <h3>${esc(t.name)}</h3>
        <p>${esc(t.desc||'')}</p>
        <div class="go">開く（別タブ） →</div>
      </div>`;
    const open=()=>{ if(document.body.classList.contains('editing')) return; window.open(t.url,'_blank','noopener'); };
    c.addEventListener('click',e=>{ if(e.target.closest('.del')) return; open(); });
    c.addEventListener('keydown',e=>{ if(e.key==='Enter') open(); });
    g.appendChild(c);
  });
  // 追加カード
  const add=document.createElement('div');
  add.className='card add'; add.tabIndex=0;
  add.innerHTML=`<div class="plus">＋</div><small>ツールを追加</small>`;
  add.addEventListener('click',()=>openModal());
  add.addEventListener('keydown',e=>{ if(e.key==='Enter') openModal(); });
  g.appendChild(add);
  // 削除
  g.querySelectorAll('[data-del]').forEach(b=>{
    b.onclick=e=>{ e.stopPropagation(); const i=+b.dataset.del;
      if(confirm(`「${tools[i].name}」を一覧から削除しますか？\n（ファイル自体は消えません）`)){ tools.splice(i,1); save(); render(); } };
  });
}
function esc(s){return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

/* 編集モード */
$('#editBtn').onclick=()=>{ document.body.classList.toggle('editing');
  $('#editBtn').textContent=document.body.classList.contains('editing')?'完了':'並べ替え・削除'; };

/* モーダル */
let selIcon='check';
function buildIconRow(){
  const r=$('#iconRow'); r.innerHTML='';
  ICON_KEYS.forEach(k=>{
    const b=document.createElement('button'); b.innerHTML=ICONS[k]; b.dataset.k=k;
    b.style.color=colorOf(k);
    if(k===selIcon) b.classList.add('sel');
    b.onclick=()=>{ selIcon=k; buildIconRow(); };
    r.appendChild(b);
  });
}
function openModal(){
  selIcon='check'; buildIconRow();
  $('#fName').value=''; $('#fUrl').value=''; $('#fCat').value=''; $('#fDesc').value='';
  $('#modalBg').classList.add('show'); $('#fName').focus();
}
function closeModal(){ $('#modalBg').classList.remove('show'); }
$('#cancelBtn').onclick=closeModal;
$('#modalBg').onclick=e=>{ if(e.target===$('#modalBg')) closeModal(); };
$('#saveBtn').onclick=()=>{
  const name=$('#fName').value.trim(), url=$('#fUrl').value.trim();
  if(!name||!url){ alert('ツール名とファイル名は必須です。'); return; }
  tools.push({name, url, cat:$('#fCat').value.trim(), desc:$('#fDesc').value.trim(), icon:selIcon});
  save(); closeModal(); render();
};
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });

render();
</script>
</body>
</html>
